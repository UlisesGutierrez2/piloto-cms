backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "static/img"
public_folder: "/img"

collections:
  - name: "documentacion"
    label: "Guías DevSecOps"
    folder: "docs"
    create: true
    nested:
      depth: 3
    meta:
      path:
        widget: string
        label: 'Path'
        index_file: 'index'
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Cuerpo del texto", name: "body", widget: "markdown"}
