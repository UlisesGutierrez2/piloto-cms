# Backend moderno apuntando directo a GitHub
backend:
  name: github
  repo: UlisesGutierrez2/piloto-cms
  branch: main
  base_url: https://sveltia-cms.netlify.app
  
# Mantenemos el flujo de Pull Requests
publish_mode: editorial_workflow

# Carpeta de imágenes por defecto
media_folder: "static/img"
public_folder: "/img"

collections:
  # --- 1. COLECCIÓN: ONBOARDING ---
  - name: "onboarding"
    label: "Onboarding"
    folder: "docs/onboarding"
    create: true
    nested:
      depth: 3
    # Las imágenes de onboarding van a su propia carpeta
    media_folder: "static/img/onboarding"
    public_folder: "/img/onboarding"
    meta:
      path:
        widget: string
        label: 'Path'
        index_file: 'index'
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Cuerpo del texto", name: "body", widget: "markdown"}

  # --- 2. COLECCIÓN: LINEAMIENTOS ---
  - name: "lineamientos"
    label: "Lineamientos"
    folder: "docs/lineamientos"
    create: true
    nested:
      depth: 3
    # Las imágenes de lineamientos van a su propia carpeta
    media_folder: "static/img/lineamientos"
    public_folder: "/img/lineamientos"
    meta:
      path:
        widget: string
        label: 'Path'
        index_file: 'index'
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Cuerpo del texto", name: "body", widget: "markdown"}
