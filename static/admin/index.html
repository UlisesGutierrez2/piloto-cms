<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Panel - DevOps</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* =========================================================
       DEVOPS DARK THEME (VERSIÓN CORREGIDA Y AGRESIVA)
       ========================================================= */
    :root {
      --bg-main: #0d1117;       
      --bg-panel: #161b22;      
      --border-color: #30363d;  
      --text-main: #c9d1d9;     
      --text-muted: #8b949e;    
      --accent-blue: #58a6ff;   
    }

    body, #nc-root, .nc-app-container { 
      font-family: 'Inter', sans-serif !important; 
      background-color: var(--bg-main) !important;
      color: var(--text-main) !important;
    }

    /* 1. NAVEGACIÓN SUPERIOR */
    .nc-app-header-container, .nc-entryEditor-header {
      background-color: var(--bg-panel) !important;
      border-bottom: 1px solid var(--border-color) !important;
    }

    /* 2. PANELES PRINCIPALES */
    .nc-entryEditor-controlPane { background-color: var(--bg-main) !important; }
    .nc-entryEditor-previewPane { 
      background-color: var(--bg-panel) !important; 
      border-left: 1px solid var(--border-color) !important;
    }

    /* 3. 🔥 FIX: QUITAR FONDOS BLANCOS DE LAS ETIQUETAS 🔥 */
    /* Apuntamos a todos los wrappers y etiquetas para forzar la transparencia */
    .nc-controlPane-widget > div,
    .nc-controlPane-widget label,
    .nc-controlPane-widget label span,
    div[class*="FieldLabel"] {
      background-color: transparent !important;
      color: var(--text-muted) !important;
      font-weight: 600 !important;
      font-size: 13px !important;
    }

    /* 4. 🔥 FIX: CAJAS DE TEXTO OSCURAS 🔥 */
    /* Usamos los selectores directos de HTML para ganarle a las clases de React */
    input, textarea, [contenteditable="true"], div[data-slate-editor="true"] {
      background-color: var(--bg-panel) !important;
      color: var(--text-main) !important;
      border: 1px solid var(--border-color) !important;
      border-radius: 6px !important;
      padding: 10px !important;
    }
    input:focus, textarea:focus, [contenteditable="true"]:focus {
      border-color: var(--accent-blue) !important;
      outline: none !important;
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2) !important;
    }

    /* 5. TOOLBAR DEL EDITOR ENRIQUECIDO */
    .nc-toolbar-toolbar {
      background-color: var(--bg-panel) !important;
      border-bottom: 1px solid var(--border-color) !important;
    }
    .nc-toolbar-toolbar button { color: var(--text-muted) !important; }
    .nc-toolbar-toolbar button:hover { background-color: var(--border-color) !important; color: var(--text-main) !important; }

    /* 6. BOTONES GLOBALES */
    button { text-transform: none !important; border-radius: 6px !important; }
    .nc-app-header-publishBtn, div[class*="DropdownButton"] button {
      background-color: var(--accent-blue) !important;
      color: white !important;
      border: none !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    // 🚀 🔥 FIX: MODO OSCURO PARA LA VISTA PREVIA (IFRAME) 🔥 🚀
    // Inyectamos CSS directamente dentro del iFrame de Decap para arreglar el contraste
    CMS.registerPreviewStyle(`
      body {
        background-color: #161b22;
        color: #c9d1d9;
        font-family: 'Inter', sans-serif;
        padding: 20px;
        line-height: 1.6;
      }
      h1, h2, h3, h4 { color: #ffffff; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
      strong, b { color: #58a6ff; }
      a { color: #58a6ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      code { background-color: #0d1117; padding: 2px 6px; border-radius: 4px; color: #ff7b72; }
      blockquote { border-left: 4px solid #30363d; color: #8b949e; padding-left: 10px; }
    `, { raw: true });

    // TU BOTÓN ÚNICO DE VIDEO (Intacto)
    CMS.registerEditorComponent({
      id: "video",
      label: "Insertar Video",
      fields: [
        {name: "youtube_url", label: "Opción A: Pega el enlace de YouTube", widget: "string", required: false},
        {name: "local_file", label: "Opción B: Sube un video MP4", widget: "file", required: false}
      ],
      pattern: /^(?:<iframe.*?src="https:\/\/www\.youtube\.com\/embed\/([^"]+)".*?><\/iframe>|<video.*?><source src="([^"]+)".*?\/><\/video>)$/,
      fromBlock: function(match) {
        return {
          youtube_url: match[1] ? 'https://www.youtube.com/watch?v=' + match[1] : '',
          local_file: match[2] || ''
        };
      },
      toBlock: function(obj) {
        if (obj.youtube_url) {
          var match = obj.youtube_url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/i);
          var videoId = match ? match[1] : obj.youtube_url;
          return '<iframe width="100%" height="400" src="https://www.youtube.com/embed/' + videoId + '" frameborder="0" allowfullscreen></iframe>';
        } else if (obj.local_file) {
          return '<video width="100%" controls><source src="' + obj.local_file + '" type="video/mp4" />Tu navegador no soporta el tag de video.</video>';
        } return '';
      },
      toPreview: function(obj) { return '<em>Vista previa de video</em>'; }
    });
  </script>
</body>
</html>
