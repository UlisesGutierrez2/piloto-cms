<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Panel - Editor DevSecOps</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link href="admin.css" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
<script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    setTimeout(() => {
        if (window.CMS) {
          
          CMS.registerPreviewStyle(`
            body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; padding: 20px; line-height: 1.6; }
            h1, h2, h3, h4 { color: #ffffff; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
            strong, b { color: #58a6ff; }
            a { color: #58a6ff; text-decoration: none; }
            code { background-color: #161b22; padding: 3px 6px; border-radius: 6px; color: #ff7b72; border: 1px solid #30363d; }
            blockquote { border-left: 4px solid #30363d; color: #8b949e; padding-left: 10px; }
          `, { raw: true });

/// 1. WIDGET DE VIDEO ACTUALIZADO (Ahora usa VideoPlayer)
          CMS.registerEditorComponent({
            id: "video", // Mantenemos el mismo ID para no romper el config.yml
            label: "🎥 Insertar VideoPlayer", // El emoji te confirmará que se actualizó
            fields: [
              {name: "youtube_url", label: "Opción A: Pega el enlace de YouTube", widget: "string", required: false},
              {name: "local_file", label: "Opción B: Sube un video MP4", widget: "file", required: false}
            ],
            
            // Patrón para que el CMS sepa leer tu componente
            pattern: /^<VideoPlayer\s+url="([^"]+)"\s*\/>$/,
            
            fromBlock: function(match) {
              let url = match[1];
              let isYoutube = url.includes('youtube.com') || url.includes('youtu.be');
              return {
                youtube_url: isYoutube ? url : '',
                local_file: !isYoutube ? url : ''
              };
            },
            
            // AQUÍ ESTÁ LA SOLUCIÓN: Obligamos al editor a escribir tu componente
            toBlock: function(obj) {
              let finalUrl = obj.youtube_url || obj.local_file || '';
              if (!finalUrl) return '';
              return `<VideoPlayer url="${finalUrl}" />`;
            },
            
            // Vista previa segura para el panel derecho
            toPreview: function(obj) { 
              let finalUrl = obj.youtube_url || obj.local_file || 'Sin ruta';
              return `<div style="padding:20px; background:#161b22; border:1px dashed #30363d; border-radius:8px; text-align:center; color:#8b949e;">🎥 <em>Vista previa de VideoPlayer:<br/><small>${finalUrl}</small></em></div>`; 
            }
          });

          // 2. EL COMPONENTE DEFINITIVO DE IMAGEN
          CMS.registerEditorComponent({
            id: "image-renderer-component", 
            label: "✅ Insertar ImageRenderer",
            fields: [{ name: "src", label: "Sube tu imagen", widget: "image" }],
            
            // Regex infalible por si se agregan espacios
            pattern: /^<ImageRenderer\s+src="([^"]+)"\s*\/>$/,
            fromBlock: function(match) {
              return { src: match[1] };
            },
            toBlock: function(obj) {
              return `<ImageRenderer src="${obj.src || ''}" />`;
            },
            toPreview: function(obj) {
              return `<figure style="margin: 1rem 0;"><img src="${obj.src}" style="max-width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);" /></figure>`;
            }
          });

        } else {
            console.error("El objeto CMS no se cargó a tiempo.");
        }
    }, 100);
  </script>
</body>
</html>
