<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Panel - Editor DevSecOps</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="admin.css" rel="stylesheet">
  
  </head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
<script>
    // 🧹 Bloque de inicialización de Netlify Identity eliminado

    setTimeout(() => {
        if (window.CMS) {
          
          CMS.registerPreviewStyle(`
            body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; padding: 20px; line-height: 1.6; }
            h1, h2, h3, h4 { color: #ffffff; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
            strong, b { color: #58a6ff; }
            a { color: #58a6ff; text-decoration: none; }
            code { background-color: #161b22; padding: 3px 6px; border-radius: 6px; color: #ff7b72; border: 1px solid #30363d; }
            blockquote { border-left: 4px solid #30363d; color: #8b949e; padding-left: 10px; }
          `, { raw: true });

          console.log("🚀 INICIANDO REGISTRO DE WIDGETS PERSONALIZADOS...");

          // 1. WIDGET DE VIDEO FLEXIBLE CON EXTRACCIÓN DE BLOB
          CMS.registerEditorComponent({
            id: "video", 
            label: "🎥 Insertar VideoPlayer", 
            fields: [
              {name: "youtube_url", label: "Opción A: Pega el enlace de YouTube", widget: "string", required: false},
              {name: "local_file", label: "Opción B: Sube un video MP4", widget: "file", required: false}
            ],
            
            pattern: /<VideoPlayer\s+url="([^"]+)"\s*\/>/,
            
            fromBlock: function(match) {
              let url = match[1];
              let isYoutube = url.includes('youtube.com') || url.includes('youtu.be');
              return { youtube_url: isYoutube ? url : '', local_file: !isYoutube ? url : '' };
            },
            toBlock: function(obj) {
              let finalUrl = obj.youtube_url || obj.local_file || '';
              return finalUrl ? `<VideoPlayer url="${finalUrl}" />` : '';
            },
toPreview: function(obj, getAsset, fields) { 
              try {
                let finalUrl = obj.youtube_url || obj.local_file || '';
                if (!finalUrl) return '';

                let isYoutube = finalUrl.includes('youtube.com') || finalUrl.includes('youtu.be');
                let previewSrc = finalUrl;

                if (!isYoutube) {
                   let asset = getAsset(finalUrl);
                   
                   // Extraemos el Blob si está recién subido desde PC
                   if (asset && asset.fileObj) {
                       previewSrc = window.URL.createObjectURL(asset.fileObj);
                   } else if (asset) {
                       previewSrc = asset.toString();
                   }
                }

                if (isYoutube) {
                   return `<div style="padding:20px; background:#161b22; border:1px dashed #30363d; border-radius:8px; text-align:center; color:#8b949e;">🎥 <em>Vista previa de YouTube<br/><small>${previewSrc}</small></em></div>`; 
                } else {
                   let fileName = finalUrl.split('/').pop();
                   
                   // EL TRUCO DEFINITIVO: Usamos onerror para alternar entre el video y la tarjeta
                   return `
                    <div style="margin: 16px 0;">
                      <div style="padding: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px;">
                        <span style="color: #58a6ff; font-family: monospace; font-size: 12px; display: block; margin-bottom: 8px; text-align: center;">⚙️ Reproductor Activo</span>
                        <video src="${previewSrc}" controls style="width: 100%; max-height: 400px; background: #000; border-radius: 4px;" 
                               onerror="this.parentElement.style.display='none'; this.parentElement.nextElementSibling.style.display='block';">
                        </video>
                      </div>
                      
                      <div style="display: none; padding: 20px; background: #161b22; border: 1px dashed #30363d; border-radius: 8px; text-align: center;">
                        <span style="color: #3fb950; font-family: monospace; font-size: 14px; display: block; margin-bottom: 8px;">✅ Archivo guardado</span>
                        <span style="color: #58a6ff; font-weight: bold; display: block; margin-bottom: 8px;">${fileName}</span>
                        <span style="color: #8b949e; font-size: 12px;">El reproductor se mostrará cuando Netlify termine de publicar los cambios.</span>
                      </div>
                    </div>
                  `;
                }
              } catch (err) {
                console.error("❌ ERROR EN VIDEO PREVIEW:", err);
                return `<div style="color:red; padding:10px; border:1px solid red;">Error renderizando preview de video</div>`;
              }
            }

                if (isYoutube) {
                   return `<div style="padding:20px; background:#161b22; border:1px dashed #30363d; border-radius:8px; text-align:center; color:#8b949e;">🎥 <em>Vista previa de YouTube<br/><small>${previewSrc}</small></em></div>`; 
                } else {
                   return `
                    <div style="padding: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin: 16px 0;">
                      <span style="color: #58a6ff; font-family: monospace; font-size: 12px; display: block; margin-bottom: 8px; text-align: center;">⚙️ Vista Previa Local Activa</span>
                      <video src="${previewSrc}" controls style="width: 100%; max-height: 400px; background: #000; border-radius: 4px;"></video>
                    </div>
                  `;
                }
              } catch (err) {
                console.error("❌ ERROR EN VIDEO PREVIEW:", err);
                return `<div style="color:red; padding:10px; border:1px solid red;">Error renderizando preview de video</div>`;
              }
            }
          });

          // 2. EL COMPONENTE DE IMAGEN FLEXIBLE
          CMS.registerEditorComponent({
            id: "image-renderer-component", 
            label: "✅ Insertar ImageRenderer",
            fields: [{ name: "src", label: "Sube tu imagen", widget: "image" }],
            
            pattern: /<ImageRenderer\s+src="([^"]+)"\s*\/>/,
            
            fromBlock: function(match) { return { src: match[1] }; },
            toBlock: function(obj) { return `<ImageRenderer src="${obj.src || ''}" />`; },
            toPreview: function(obj, getAsset, fields) {
              try {
                console.log("=== 🟢 DIAGNÓSTICO IMAGEN EJECUTÁNDOSE ===", obj);
                if(!obj.src) return '';
                let imgSrc = getAsset(obj.src).toString();

                return `
                  <figure style="margin: 1rem 0; padding: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px;">
                     <span style="color: #3fb950; font-family: monospace; font-size: 12px; display: block; margin-bottom: 8px; text-align: center;">✅ Vista Previa Local Activa</span>
                    <img src="${imgSrc}" style="max-width: 100%; border-radius: 4px;" />
                  </figure>
                `;
              } catch (err) {
                console.error("❌ ERROR EN IMAGEN PREVIEW:", err);
                return `<div style="color:red;">Error en preview de imagen</div>`;
              }
            }
          });
        } else {
            console.error("El objeto CMS no se cargó a tiempo.");
        }
    }, 100);
  </script>
</body>
</html>
