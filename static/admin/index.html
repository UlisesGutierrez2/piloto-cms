<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Panel - DevOps</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

  <script>
    // 1. BOTÓN DE YOUTUBE (AHORA ACEPTA LA URL COMPLETA)
    CMS.registerEditorComponent({
      id: "youtube",
      label: "Video de YouTube",
      fields: [{name: "url", label: "Pega el enlace de YouTube completo", widget: "string"}],
      pattern: /^<iframe.*?src="https:\/\/www\.youtube\.com\/embed\/(.*?)".*?><\/iframe>$/,
      fromBlock: function(match) { return { url: match[1] }; },
      toBlock: function(obj) {
        // Magia: Extrae automáticamente el ID de cualquier formato de URL de YouTube
        var match = obj.url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/i);
        var videoId = match ? match[1] : obj.url;
        
        return '<iframe width="100%" height="400" src="https://www.youtube.com/embed/' + videoId + '" frameborder="0" allowfullscreen></iframe>';
      },
      toPreview: function(obj) {
        var match = obj.url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/i);
        var videoId = match ? match[1] : obj.url;
        
        return '<img src="https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg" style="width:100%; max-width:560px;"/>';
      }
    });

    // 2. BOTÓN DE VIDEO LOCAL (MP4) CON LA CORRECCIÓN MDX (/>)
    CMS.registerEditorComponent({
      id: "video_local",
      label: "Video Local (MP4)",
      fields: [{name: "src", label: "Sube o selecciona un video", widget: "file"}],
      pattern: /^<video.*?src="(.*?)".*?><\/video>$/,
      fromBlock: function(match) { return { src: match[1] }; },
      toBlock: function(obj) {
        // Etiqueta source cerrada con /> para evitar errores de compilación en Docusaurus
        return '<video width="100%" controls><source src="' + obj.src + '" type="video/mp4" />Tu navegador no soporta el tag de video.</video>';
      },
      toPreview: function(obj) {
        return '<video width="100%" controls><source src="' + obj.src + '" type="video/mp4" /></video>';
      }
    });
  </script>
</body>
</html>
