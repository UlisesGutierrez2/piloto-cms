<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Panel - Editor DevSecOps</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link href="admin.css" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
<script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    setTimeout(() => {
        if (window.CMS) {
          
          CMS.registerPreviewStyle(`
            body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; padding: 20px; line-height: 1.6; }
            h1, h2, h3, h4 { color: #ffffff; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
            strong, b { color: #58a6ff; }
            a { color: #58a6ff; text-decoration: none; }
            code { background-color: #161b22; padding: 3px 6px; border-radius: 6px; color: #ff7b72; border: 1px solid #30363d; }
            blockquote { border-left: 4px solid #30363d; color: #8b949e; padding-left: 10px; }
          `, { raw: true });

          // 1. WIDGET DE VIDEO ACTUALIZADO CON GETASSET
          CMS.registerEditorComponent({
            id: "video", 
            label: "🎥 Insertar VideoPlayer", 
            fields: [
              {name: "youtube_url", label: "Opción A: Pega el enlace de YouTube", widget: "string", required: false},
              {name: "local_file", label: "Opción B: Sube un video MP4", widget: "file", required: false}
            ],
            
            pattern: /^<VideoPlayer\s+url="([^"]+)"\s*\/>$/,
            
            fromBlock: function(match) {
              let url = match[1];
              let isYoutube = url.includes('youtube.com') || url.includes('youtu.be');
              return {
                youtube_url: isYoutube ? url : '',
                local_file: !isYoutube ? url : ''
              };
            },
            
            toBlock: function(obj) {
              let finalUrl = obj.youtube_url || obj.local_file || '';
              if (!finalUrl) return '';
              return `<VideoPlayer url="${finalUrl}" />`;
            },
            
            // MAGIA DE LA VISTA PREVIA: Agregamos getAsset
            toPreview: function(obj, getAsset, fields) { 
              let finalUrl = obj.youtube_url || obj.local_file || '';
              if (!finalUrl) return '';

              // Si es YouTube, usamos la URL tal cual. Si es local, usamos getAsset para el Blob.
              let isYoutube = finalUrl.includes('youtube.com') || finalUrl.includes('youtu.be');
              let previewSrc = isYoutube ? finalUrl : getAsset(finalUrl).toString();

              if (isYoutube) {
                 return `<div style="padding:20px; background:#161b22; border:1px dashed #30363d; border-radius:8px; text-align:center; color:#8b949e;">🎥 <em>Vista previa de Video de YouTube desactivada en editor para mejor rendimiento.<br/><small>${previewSrc}</small></em></div>`; 
              } else {
                 return `
                  <div style="padding: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin: 16px 0;">
                    <span style="color: #58a6ff; font-family: monospace; font-size: 12px; display: block; margin-bottom: 8px; text-align: center;">
                      ⚙️ Vista Previa Local Activa
                    </span>
                    <video src="${previewSrc}" controls style="width: 100%; max-height: 400px; background: #000; border-radius: 4px;"></video>
                  </div>
                `;
              }
            }
          });

          // 2. EL COMPONENTE DEFINITIVO DE IMAGEN CON GETASSET
          CMS.registerEditorComponent({
            id: "image-renderer-component", 
            label: "✅ Insertar ImageRenderer",
            fields: [{ name: "src", label: "Sube tu imagen", widget: "image" }],
            
            pattern: /^<ImageRenderer\s+src="([^"]+)"\s*\/>$/,
            fromBlock: function(match) {
              return { src: match[1] };
            },
            toBlock: function(obj) {
              return `<ImageRenderer src="${obj.src || ''}" />`;
            },
            // MAGIA DE LA VISTA PREVIA: Agregamos getAsset
            toPreview: function(obj, getAsset, fields) {
              // Convertimos la ruta en un Blob temporal
              let imgSrc = obj.src ? getAsset(obj.src).toString() : '';
              
              if(!imgSrc) return '';

              return `
                <figure style="margin: 1rem 0; padding: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px;">
                   <span style="color: #3fb950; font-family: monospace; font-size: 12px; display: block; margin-bottom: 8px; text-align: center;">
                      ✅ Vista Previa Local Activa
                    </span>
                  <img src="${imgSrc}" style="max-width: 100%; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.5);" />
                </figure>
              `;
            }
          });

        } else {
            console.error("El objeto CMS no se cargó a tiempo.");
        }
    }, 100);
  </script>
</body>
</html>
