<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Panel - Editor</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* =========================================================
       DEVOPS DARK THEME PARA DECAP CMS
       ========================================================= */
    
    :root {
      --bg-main: #0d1117;       /* Fondo global (Estilo GitHub Dark) */
      --bg-panel: #161b22;      /* Fondo de los paneles */
      --border-color: #30363d;  /* Bordes sutiles */
      --text-main: #c9d1d9;     /* Texto claro */
      --text-muted: #8b949e;    /* Texto secundario/Labels */
      --accent-blue: #58a6ff;   /* Azul para focus y botones */
      --accent-green: #238636;  /* Verde para "Published" */
    }

    /* 1. Reset Global y Fuentes */
    body, #nc-root, .nc-app-container { 
      font-family: 'Inter', sans-serif !important; 
      background-color: var(--bg-main) !important;
      color: var(--text-main) !important;
    }

    /* 2. Barra de Navegación Superior */
    .nc-app-header-container, .nc-entryEditor-header {
      background-color: var(--bg-panel) !important;
      border-bottom: 1px solid var(--border-color) !important;
    }
    .nc-app-header-container a, .nc-entryEditor-header span { color: var(--text-main) !important; }

    /* 3. Panel Izquierdo (Controles y Formulario) */
    .nc-entryEditor-controlPane { 
      background-color: var(--bg-main) !important; 
      border: none !important;
    }

    /* 4. Panel Derecho (Previsualización) */
    .nc-entryEditor-previewPane { 
      background-color: var(--bg-panel) !important; 
      border-left: 1px solid var(--border-color) !important;
      color: var(--text-main) !important;
    }
    
    /* Ajuste para que la preview no se vea blanca como un parche */
    .nc-entryEditor-previewPane iframe {
       background-color: var(--bg-main) !important;
       border-radius: 8px;
    }

    /* 5. Etiquetas de los campos (PATH, TÍTULO, etc.) */
    .nc-controlPane-widget label {
      color: var(--text-muted) !important;
      font-weight: 600 !important;
      letter-spacing: 0.5px !important;
      font-size: 12px !important;
    }

    /* 6. Inputs (Cajas de texto) */
    .nc-controlPane-widget input,
    .nc-controlPane-widget textarea,
    div[class*="css-"] /* Apunta a los wrappers internos de React */ {
      background-color: var(--bg-panel) !important;
      color: var(--text-main) !important;
      border: 1px solid var(--border-color) !important;
      border-radius: 6px !important;
      transition: all 0.2s ease-in-out;
    }

    .nc-controlPane-widget input:focus,
    .nc-controlPane-widget textarea:focus {
      border-color: var(--accent-blue) !important;
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2) !important;
      outline: none !important;
    }

    /* 7. La Barra de Herramientas (Menú de formato) */
    .nc-toolbar-toolbar {
      background-color: var(--bg-panel) !important;
      border: 1px solid var(--border-color) !important;
      border-bottom: none !important; /* Une la barra con el textarea */
      border-radius: 6px 6px 0 0 !important;
      padding: 8px !important;
    }
    
    /* Botones dentro del menú de formato */
    .nc-toolbar-toolbar button {
      color: var(--text-muted) !important;
      border-radius: 4px !important;
    }
    .nc-toolbar-toolbar button:hover {
      background-color: var(--border-color) !important;
      color: var(--text-main) !important;
    }

    /* 8. Botones principales (Save, Publish) */
    button { text-transform: none !important; font-weight: 500 !important; }
    
    /* Botón Guardar */
    .nc-entryEditor-header button:first-child {
      background-color: var(--bg-panel) !important;
      border: 1px solid var(--border-color) !important;
      color: var(--text-main) !important;
    }
    /* Botón Publicar/Estado */
    .nc-app-header-publishBtn, div[class*="DropdownButton"] button {
      background-color: var(--accent-blue) !important;
      color: white !important;
      border: none !important;
    }
  </style>
  
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    // BOTÓN ÚNICO DE VIDEO (YOUTUBE + LOCAL)
    CMS.registerEditorComponent({
      id: "video",
      label: "Insertar Video",
      fields: [
        {name: "youtube_url", label: "Opción A: Pega el enlace de YouTube", widget: "string", required: false},
        {name: "local_file", label: "Opción B: Sube un video MP4", widget: "file", required: false}
      ],
      pattern: /^(?:<iframe.*?src="https:\/\/www\.youtube\.com\/embed\/([^"]+)".*?><\/iframe>|<video.*?><source src="([^"]+)".*?\/><\/video>)$/,
      fromBlock: function(match) {
        return {
          youtube_url: match[1] ? 'https://www.youtube.com/watch?v=' + match[1] : '',
          local_file: match[2] || ''
        };
      },
      toBlock: function(obj) {
        if (obj.youtube_url) {
          var match = obj.youtube_url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/i);
          var videoId = match ? match[1] : obj.youtube_url;
          return '<iframe width="100%" height="400" src="https://www.youtube.com/embed/' + videoId + '" frameborder="0" allowfullscreen></iframe>';
        } else if (obj.local_file) {
          return '<video width="100%" controls><source src="' + obj.local_file + '" type="video/mp4" />Tu navegador no soporta el tag de video.</video>';
        } return '';
      },
      toPreview: function(obj) { return '<em>Vista previa de video</em>'; }
    });
  </script>
</body>
</html>
